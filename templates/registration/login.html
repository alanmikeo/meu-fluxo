{% extends 'base.html' %}
{% load static %}
{% block title %}Login{% endblock %}

{% block content %}
<body>
    <div class="blob"></div>
    <div class="blob"
        style="animation-delay: -10s; right: -5%; bottom: -5%; background: linear-gradient(135deg, #7c3aed 0%, #db2777 100%);">
    </div>

    <div class="w-full max-w-md px-6 py-12 glass rounded-3xl relative z-10 mx-4">
        <div class="text-center mb-10">
            <div
                class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-indigo-600/20 border border-indigo-500/30 mb-6">
                <i data-lucide="shield-check" class="w-8 h-8 text-indigo-400"></i>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Bem-vindo de volta</h1>
            <p class="text-slate-400 mt-2">Acesse sua conta para continuar</p>
        </div>

        <form class="space-y-6" onsubmit="return false;">
            <div class="relative input-group">
                <input type="email" id="email" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:border-indigo-500 transition-colors peer placeholder-transparent"
                    placeholder="E-mail">
                <label for="email"
                    class="absolute left-4 top-3 text-slate-400 floating-label peer-focus:text-indigo-400 peer-[:not(:placeholder-shown)]:translate-y-[-1.5rem] peer-[:not(:placeholder-shown)]:scale-[0.85]">
                    E-mail
                </label>
            </div>

            <div class="relative input-group">
                <input type="password" id="password" required
                    class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white outline-none focus:border-indigo-500 transition-colors peer placeholder-transparent"
                    placeholder="Senha">
                <label for="password"
                    class="absolute left-4 top-3 text-slate-400 floating-label peer-focus:text-indigo-400 peer-[:not(:placeholder-shown)]:translate-y-[-1.5rem] peer-[:not(:placeholder-shown)]:scale-[0.85]">
                    Senha
                </label>
                <button type="button"
                    class="absolute right-4 top-3.5 text-slate-500 hover:text-white transition-colors">
                    <i data-lucide="eye" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center space-x-2 cursor-pointer group">
                    <div class="relative flex items-center">
                        <input type="checkbox" class="sr-only peer">
                        <div
                            class="w-5 h-5 border border-white/20 rounded-md bg-white/5 peer-checked:bg-indigo-600 peer-checked:border-indigo-600 transition-all">
                        </div>
                        <i data-lucide="check"
                            class="absolute w-3.5 h-3.5 text-white opacity-0 peer-checked:opacity-100 left-0.5 transition-opacity"></i>
                    </div>
                    <span class="text-slate-400 group-hover:text-slate-300 transition-colors">Lembrar-me</span>
                </label>
                <a href="#" class="text-indigo-400 hover:text-indigo-300 transition-colors font-medium">Esqueceu a
                    senha?</a>
            </div>

            <button type="submit"
                class="w-full py-4 rounded-xl text-white font-semibold btn-primary flex items-center justify-center space-x-2">
                <span>Entrar no Fluxo</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-white/10 text-center text-sm">
            <p class="text-slate-400">
                Não tem uma conta?
                <a href="#" class="text-indigo-400 hover:text-indigo-300 transition-colors font-semibold">Crie agora</a>
            </p>
        </div>
    </div>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();

        // Toggle visibilidade da senha (apenas exemplo)
        const passwordToggle = document.querySelector('button i[data-lucide="eye"]')?.parentElement;
        const passwordInput = document.getElementById('password');

        if (passwordToggle) {
            passwordToggle.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);

                const iconName = type === 'password' ? 'eye' : 'eye-off';
                passwordToggle.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5"></i>`;
                lucide.createIcons();
            });
        }
    </script>
{% endblock %}
